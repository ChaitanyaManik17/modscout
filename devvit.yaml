name: modscoutttt
version: 0.0.1
description: >
  ModScout helps moderators retain new members by automatically welcoming them,
  coaching them before their first post, and sending friendly guidance when a
  first post is removed — cutting new-user mod work by up to 60%.
icon: community
tags:
  - mod-tool
  - community
  - utility
permissions:
  - reddit.read
  - reddit.write
  - reddit.moderation
  - reddit.private-messages
  - kvStore
  - scheduler
